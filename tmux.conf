set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"

set -g mouse on

set -g base-index 1
setw -g pane-base-index 1

set -g renumber-windows on

set -g status-position bottom
set -g status-style bg=colour235,fg=colour136
set -g status-left " #S "
set -g status-left-style bg=colour235,fg=colour136
set -g status-right " %H:%M %d-%b-%y "
set -g status-right-style bg=colour235,fg=colour136

setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #I:#W "
setw -g window-status-current-style bg=colour238,fg=colour136

set -g pane-border-style fg=colour238
set -g pane-active-border-style fg=colour136

set -g message-style bg=colour235,fg=colour136

setw -g mode-keys vi
set -g status-keys vi

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind | split-window -h
bind - split-window -v

bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

set -g history-limit 10000