name: Build and Push Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * 1"

env:
  REGISTRY: ghcr.io

jobs:
  build:
    permissions:
      contents: read
      packages: write
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: base
            runs-on: ubuntu-latest
            platform: linux/amd64
          - target: base
            runs-on: ubuntu-24.04-arm
            platform: linux/arm64
          - target: tmux
            runs-on: ubuntu-latest
            platform: linux/amd64
          - target: tmux
            runs-on: ubuntu-24.04-arm
            platform: linux/arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Set image name
        run: |
          if [ "${{ matrix.target }}" = "tmux" ]; then
            echo "IMAGE_NAME=ghcr.io/${{ github.repository }}-tmux" >> $GITHUB_ENV
          else
            echo "IMAGE_NAME=ghcr.io/${{ github.repository }}" >> $GITHUB_ENV
          fi

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push (digest)
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ env.IMAGE_NAME }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v6
        with:
          name: digests-${{ matrix.target }}-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - name: Download base digests
        uses: actions/download-artifact@v7
        with:
          path: ${{ runner.temp }}/digests/base
          pattern: digests-base-*
          merge-multiple: true

      - name: Download tmux digests
        uses: actions/download-artifact@v7
        with:
          path: ${{ runner.temp }}/digests/tmux
          pattern: digests-tmux-*
          merge-multiple: true

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta (base)
        id: meta-base
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=true

      - name: Docker meta (tmux)
        id: meta-tmux
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-tmux
          tags: |
            type=raw,value=latest,enable=true

      - name: Create base manifest
        working-directory: ${{ runner.temp }}/digests/base
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ github.repository }}@sha256:%s ' *)

      - name: Create tmux manifest
        working-directory: ${{ runner.temp }}/digests/tmux
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ github.repository }}-tmux@sha256:%s ' *)